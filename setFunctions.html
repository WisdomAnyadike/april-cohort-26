   function runFunction(e) {

function changeBackground(params) {
          function getR () {
       return  Math.floor(Math.random() * 256)
        }
document.body.style.backgroundColor = `rgb(${getR()},${getR()},${getR()})`
}


  let colorChanger = null


   function startTheInterval(params) {
    colorChanger = setInterval(() => {
    changeBackground()
   }, 5000);
   }


   function stopTheInterval(params) {
    clearInterval(colorChanger)
   }
