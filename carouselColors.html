<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .slides{
        position: relative;
        width: 100%;
        height: 100vh;
        .slide{
            width: 100%;
            height: 100vh;
            display: none;
        }
        button{
            border: none;
            padding: 10px;
            outline: none;
            position: absolute;
            background-color: rgba(0, 0, 0, 0.549);
            color: white;
            top: 50%;
        }
        button:first-child{
            left: 0;
            border-radius: 0 50px 50px 0;
            
        }
        button:last-child{
            right: 0;
            border-radius: 50px 0 0 50px;
            
        }
        #slide1{
            background-color: red;
            display: block;
        }
        #slide2{
            background-color: yellow;
        }
        #slide3{
            background-color: blue;
        }
        #slide4{
            background-color: green;
        }
    }
</style>
<body>
    <div class="slides">
        <button id="previous" onclick="prev()">prev</button>
        <div id="slide1" class="slide"></div>
        <div id="slide2" class="slide"></div>
        <div id="slide3" class="slide"></div>
        <div id="slide4" class="slide"></div>
        <button id="next" onclick="next()">next</button>
    </div>
    
</body>
</html>

<script>

    let slides = 4;

    let active = 1, previous;

    function prev(){
        active--;
        previous = active + 1 

        if(active < 1) {
            active = 4;
        }

        document.getElementById('slide'+active).style.display = "block";
        document.getElementById('slide'+previous).style.display = "none";
    }

    function next(){
        active++;
        previous = active - 1 

        if(active > 4) {
            active = 1;
        }

        document.getElementById('slide'+active).style.display = "block";
        document.getElementById('slide'+previous).style.display = "none";
    }

</script>
